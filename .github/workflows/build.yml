name: 构建 H5000M 固件

on:
  workflow_dispatch:
    inputs:
      immortalwrt_ref:
        description: ImmortalWrt 分支、标签或提交，例如 v25.12.0、master
        required: true
        default: v25.12.0
      runner_type:
        description: 编译运行环境
        required: true
        type: choice
        default: github-hosted
        options:
          - github-hosted
          - self-hosted
      make_jobs:
        description: 并行编译线程数；留空表示使用全部可用核心
        required: false
        default: ""
      qmodem:
        description: 集成 QModem 相关包，并排除重复的旧版界面包
        required: true
        type: boolean
        default: true
      passwall:
        description: 集成 luci-app-passwall
        required: true
        type: boolean
        default: false
      mosdns:
        description: 集成 luci-app-mosdns
        required: true
        type: boolean
        default: false
      upnp:
        description: 集成 luci-app-upnp
        required: true
        type: boolean
        default: false
      homeproxy:
        description: 集成 luci-app-homeproxy
        required: true
        type: boolean
        default: false
      create_release:
        description: 编译完成后发布到 GitHub Releases
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-github-hosted:
    name: GitHub 托管机编译
    if: inputs.runner_type == 'github-hosted'
    runs-on: ubuntu-24.04

    steps:
      - name: 检出构建项目
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils python3-pyelftools qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim \
            wget xmlto xxd zlib1g-dev zstd

      - name: 准备 ImmortalWrt 源码
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/prepare-source.sh "${{ inputs.immortalwrt_ref }}"

      - name: 更新并安装软件源
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入勾选的软件包
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/apply-package-options.sh

      - name: 生成最终配置
        working-directory: openwrt
        run: make defconfig

      - name: 检查勾选的软件包
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/verify-package-options.sh

      - name: 下载源码包
        working-directory: openwrt
        run: make download -j"$(nproc)"

      - name: 编译固件
        working-directory: openwrt
        run: |
          if [ -n "${{ inputs.make_jobs }}" ]; then
            make -j"${{ inputs.make_jobs }}"
          else
            make -j"$(nproc)"
          fi

      - name: 上传固件产物
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-h5000m-${{ inputs.immortalwrt_ref }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*

      - name: 准备发布信息
        if: ${{ inputs.create_release }}
        run: |
          safe_ref="$(printf '%s' '${{ inputs.immortalwrt_ref }}' | tr '/:@ ' '----')"
          echo "RELEASE_TAG=immortalwrt-h5000m-${safe_ref}-${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=ImmortalWrt-H5000M ${{ inputs.immortalwrt_ref }} 第 ${{ github.run_number }} 次构建" >> "$GITHUB_ENV"

      - name: 发布到 GitHub Releases
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: openwrt/bin/targets/mediatek/filogic/*
          fail_on_unmatched_files: true
          make_latest: false

  build-self-hosted:
    name: 本地 Runner 编译
    if: inputs.runner_type == 'self-hosted'
    runs-on: self-hosted

    steps:
      - name: 检出构建项目
        uses: actions/checkout@v4

      - name: 检查本地 Runner 环境
        run: |
          if [ "$(uname -s)" != "Linux" ]; then
            echo "本地 Runner 必须运行在 Linux/Ubuntu 或 WSL2 环境。"
            exit 1
          fi
          echo "本地 Runner 检查通过。"

      - name: 准备 ImmortalWrt 源码
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/prepare-source.sh "${{ inputs.immortalwrt_ref }}"

      - name: 更新并安装软件源
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入勾选的软件包
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/apply-package-options.sh

      - name: 生成最终配置
        working-directory: openwrt
        run: make defconfig

      - name: 检查勾选的软件包
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/verify-package-options.sh

      - name: 下载源码包
        working-directory: openwrt
        run: make download -j"$(nproc)"

      - name: 编译固件
        working-directory: openwrt
        run: |
          if [ -n "${{ inputs.make_jobs }}" ]; then
            make -j"${{ inputs.make_jobs }}"
          else
            make -j"$(nproc)"
          fi

      - name: 上传固件产物
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-h5000m-${{ inputs.immortalwrt_ref }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*

      - name: 准备发布信息
        if: ${{ inputs.create_release }}
        run: |
          safe_ref="$(printf '%s' '${{ inputs.immortalwrt_ref }}' | tr '/:@ ' '----')"
          echo "RELEASE_TAG=immortalwrt-h5000m-${safe_ref}-${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=ImmortalWrt-H5000M ${{ inputs.immortalwrt_ref }} 第 ${{ github.run_number }} 次构建" >> "$GITHUB_ENV"

      - name: 发布到 GitHub Releases
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: openwrt/bin/targets/mediatek/filogic/*
          fail_on_unmatched_files: true
          make_latest: false
