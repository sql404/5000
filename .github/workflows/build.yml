name: 构建 openwrt-H5000M 固件

on:
  workflow_dispatch:
    inputs:
      openwrt_ref:
        description: OpenWrt 版本
        required: true
        default: v25.12.4
      runner_type:
        description: 编译环境
        required: true
        type: choice
        default: github-hosted
        options:
          - github-hosted
          - self-hosted
      make_jobs:
        description: 编译线程，留空使用全部核心
        required: false
        default: ""
      qmodem:
        description: "1. QModem：5G 模块管理"
        required: true
        type: boolean
        default: true
      upnp:
        description: "2. UPnP：端口自动映射"
        required: true
        type: boolean
        default: true
      passwall:
        description: "3. PassWall：代理插件"
        required: true
        type: boolean
        default: false
      homeproxy:
        description: "4. HomeProxy：代理插件"
        required: true
        type: boolean
        default: false
      mosdns:
        description: "5. MosDNS：DNS 分流插件"
        required: true
        type: boolean
        default: false
      small_package:
        description: 额外插件库，勾选 3/4/5 时自动添加
        required: true
        type: boolean
        default: false
      create_release:
        description: 发布 Releases
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-github-hosted:
    name: GitHub 托管机编译
    if: inputs.runner_type == 'github-hosted'
    runs-on: ubuntu-24.04

    steps:
      - name: 检出项目
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils python3-pyelftools qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim \
            wget xmlto xxd zlib1g-dev zstd

      - name: 准备 OpenWrt 源码
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
          INCLUDE_SMALL_PACKAGE: ${{ inputs.small_package && 'true' || 'false' }}
        run: bash ./scripts/prepare-source.sh "${{ inputs.openwrt_ref }}"

      - name: 更新软件源
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 修复第三方 feed
        run: bash ./scripts/patch-feeds.sh

      - name: 写入插件选择
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/apply-package-options.sh

      - name: 生成配置
        working-directory: openwrt
        run: make defconfig

      - name: 检查插件
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/verify-package-options.sh

      - name: 下载源码包
        working-directory: openwrt
        run: make download -j"$(nproc)"

      - name: 编译固件
        id: compile
        working-directory: openwrt
        run: |
          if [ -n "${{ inputs.make_jobs }}" ]; then
            make -j"${{ inputs.make_jobs }}"
          else
            make -j"$(nproc)"
          fi

      - name: 输出失败详情
        if: ${{ failure() && steps.compile.outcome == 'failure' }}
        working-directory: openwrt
        run: make -j1 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-H5000M-${{ inputs.openwrt_ref }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*

      - name: 准备发布
        if: ${{ inputs.create_release }}
        run: |
          safe_ref="$(printf '%s' '${{ inputs.openwrt_ref }}' | tr '/:@ ' '----')"
          echo "RELEASE_TAG=openwrt-H5000M-${safe_ref}-${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=openwrt-H5000M ${{ inputs.openwrt_ref }} 第 ${{ github.run_number }} 次构建" >> "$GITHUB_ENV"

      - name: 发布 Releases
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: openwrt-H5000M ${{ inputs.openwrt_ref }} build ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          make_latest: false
          files: openwrt/bin/targets/mediatek/filogic/*

  build-self-hosted:
    name: 本地 Runner 编译
    if: inputs.runner_type == 'self-hosted'
    runs-on: self-hosted
    env:
      USE_CCACHE: "1"
      CCACHE_DIR: /home/builder/openwrt-h5000m-cache/ccache
      DL_DIR: /home/builder/openwrt-h5000m-cache/dl

    steps:
      - name: 检出项目
        uses: actions/checkout@v4

      - name: 检查本地环境
        run: |
          if [ "$(uname -s)" != "Linux" ]; then
            echo "本地 Runner 必须运行在 Linux、Ubuntu 或 WSL2 环境。"
            exit 1
          fi
          echo "本地 Runner 检查通过。"

      - name: 配置缓存与代理
        run: |
          mkdir -p "${CCACHE_DIR}" "${DL_DIR}"
          ccache --set-config=max_size=80G || ccache -M 80G
          git config --global http.proxy "${http_proxy:-http://127.0.0.1:10808}"
          git config --global https.proxy "${https_proxy:-http://127.0.0.1:10808}"
          echo "源码包缓存目录：${DL_DIR}"
          echo "编译缓存目录：${CCACHE_DIR}"
          ccache -s -v | sed -n '1,80p'
          du -sh "${DL_DIR}" "${CCACHE_DIR}" 2>/dev/null || true

      - name: 准备 OpenWrt 源码
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
          INCLUDE_SMALL_PACKAGE: ${{ inputs.small_package && 'true' || 'false' }}
        run: bash ./scripts/prepare-source.sh "${{ inputs.openwrt_ref }}"

      - name: 更新软件源
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 修复第三方 feed
        run: bash ./scripts/patch-feeds.sh

      - name: 写入插件选择
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/apply-package-options.sh

      - name: 生成配置
        working-directory: openwrt
        run: |
          {
            echo "CONFIG_DEVEL=y"
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_CCACHE_DIR=\"${CCACHE_DIR}\""
          } >> .config
          make defconfig
          grep -E '^CONFIG_DEVEL=y|^CONFIG_CCACHE=y|^CONFIG_CCACHE_DIR=|^CONFIG_DOWNLOAD_FOLDER=|^CONFIG_TARGET_' .config | sed -n '1,80p'

      - name: 检查插件
        env:
          INCLUDE_QMODEM: ${{ inputs.qmodem && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
        run: bash ./scripts/verify-package-options.sh

      - name: 下载源码包
        working-directory: openwrt
        run: |
          make DL_DIR="${DL_DIR}" download -j"$(nproc)"
          du -sh "${DL_DIR}" 2>/dev/null || true

      - name: 编译固件
        id: compile
        working-directory: openwrt
        run: |
          if [ -n "${{ inputs.make_jobs }}" ]; then
            make DL_DIR="${DL_DIR}" -j"${{ inputs.make_jobs }}"
          else
            make DL_DIR="${DL_DIR}" -j"$(nproc)"
          fi

      - name: 输出失败详情
        if: ${{ failure() && steps.compile.outcome == 'failure' }}
        working-directory: openwrt
        run: make DL_DIR="${DL_DIR}" -j1 V=s

      - name: 输出缓存统计
        if: ${{ always() }}
        run: |
          ccache -s -v | sed -n '1,100p'
          du -sh "${DL_DIR}" "${CCACHE_DIR}" 2>/dev/null || true

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-H5000M-${{ inputs.openwrt_ref }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*

      - name: 准备发布
        if: ${{ inputs.create_release }}
        run: |
          safe_ref="$(printf '%s' '${{ inputs.openwrt_ref }}' | tr '/:@ ' '----')"
          echo "RELEASE_TAG=openwrt-H5000M-${safe_ref}-${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=openwrt-H5000M ${{ inputs.openwrt_ref }} 第 ${{ github.run_number }} 次构建" >> "$GITHUB_ENV"

      - name: 发布 Releases
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: openwrt-H5000M ${{ inputs.openwrt_ref }} build ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          make_latest: false
          files: openwrt/bin/targets/mediatek/filogic/*
