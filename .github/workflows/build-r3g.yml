name: Build openwrt-R3G firmware

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: Build runner
        required: true
        type: choice
        default: github-hosted
        options:
          - github-hosted
          - self-hosted
      openwrt_ref:
        description: OpenWrt ref
        required: true
        default: v25.12.4
      make_jobs:
        description: Build jobs, empty means all cores
        required: false
        default: ""
      passwall:
        description: Add PassWall
        required: true
        type: boolean
        default: true
      create_release:
        description: Publish GitHub Release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ inputs.runner_type == 'self-hosted' && 'Self-hosted runner build' || 'GitHub hosted build' }}
    runs-on: ${{ inputs.runner_type == 'self-hosted' && 'lxc' || 'ubuntu-24.04' }}
    env:
      BUILD_DL_DIR: ${{ inputs.runner_type == 'self-hosted' && '/home/builder/openwrt-r3g-cache/dl' || '' }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install dependencies
        if: ${{ inputs.runner_type == 'github-hosted' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils python3-pyelftools qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim \
            wget xmlto xxd zlib1g-dev zstd

      - name: Prepare official OpenWrt source
        env:
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
        run: bash ./openwrt-R3G/scripts/prepare-source.sh "${{ inputs.openwrt_ref }}"

      - name: Update feeds
        working-directory: openwrt-R3G/openwrt
        run: ./scripts/feeds update -a

      - name: Install feeds
        env:
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
        run: bash ./openwrt-R3G/scripts/install-feeds.sh

      - name: Apply package options
        env:
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
        run: bash ./openwrt-R3G/scripts/apply-package-options.sh

      - name: Configure self-hosted download cache
        if: ${{ inputs.runner_type == 'self-hosted' }}
        run: |
          mkdir -p "${BUILD_DL_DIR}"
          {
            echo "# CONFIG_DEVEL is not set"
            echo "# CONFIG_TOOLCHAINOPTS is not set"
            echo "# CONFIG_CCACHE is not set"
            echo "# CONFIG_GDB is not set"
            echo "# CONFIG_GDB_PYTHON is not set"
          } >> openwrt-R3G/openwrt/.config

      - name: Generate config
        working-directory: openwrt-R3G/openwrt
        run: make defconfig

      - name: Disable debug toolchain options
        working-directory: openwrt-R3G/openwrt
        run: |
          sed -i \
            -e '/^CONFIG_DEVEL=/d' \
            -e '/^# CONFIG_DEVEL is not set/d' \
            -e '/^CONFIG_TOOLCHAINOPTS=/d' \
            -e '/^# CONFIG_TOOLCHAINOPTS is not set/d' \
            -e '/^CONFIG_CCACHE=/d' \
            -e '/^# CONFIG_CCACHE is not set/d' \
            -e '/^CONFIG_CCACHE_DIR=/d' \
            -e '/^CONFIG_GDB=/d' \
            -e '/^# CONFIG_GDB is not set/d' \
            -e '/^CONFIG_GDB_PYTHON=/d' \
            -e '/^# CONFIG_GDB_PYTHON is not set/d' \
            .config
          {
            echo "# CONFIG_DEVEL is not set"
            echo "# CONFIG_TOOLCHAINOPTS is not set"
            echo "# CONFIG_CCACHE is not set"
            echo "# CONFIG_GDB is not set"
            echo "# CONFIG_GDB_PYTHON is not set"
          } >> .config

      - name: Verify package options
        env:
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
        run: bash ./openwrt-R3G/scripts/verify-package-options.sh

      - name: Download sources
        working-directory: openwrt-R3G/openwrt
        run: |
          if [ -n "${BUILD_DL_DIR}" ]; then
            make DL_DIR="${BUILD_DL_DIR}" download -j"$(nproc)"
          else
            make download -j"$(nproc)"
          fi

      - name: Prebuild host ninja
        working-directory: openwrt-R3G/openwrt
        run: make tools/ninja/compile -j1

      - name: Compile firmware
        id: compile
        working-directory: openwrt-R3G/openwrt
        run: |
          make_args=()
          if [ -n "${BUILD_DL_DIR}" ]; then
            make_args+=(DL_DIR="${BUILD_DL_DIR}")
          fi
          if [ -n "${{ inputs.make_jobs }}" ]; then
            make "${make_args[@]}" -j"${{ inputs.make_jobs }}"
          else
            make "${make_args[@]}" -j"$(nproc)"
          fi

      - name: Print failure logs
        if: ${{ failure() && steps.compile.outcome == 'failure' }}
        working-directory: openwrt-R3G/openwrt
        run: |
          if [ -d logs ]; then
            find logs -type f | sort
            find logs -type f | sort | while read -r log; do
              echo "::group::${log}"
              tail -n 240 "${log}" || true
              echo "::endgroup::"
            done
          fi
          timeout 45m make -j1 V=s || true

      - name: Upload failure logs
        if: ${{ failure() && steps.compile.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-R3G-build-logs-${{ github.run_number }}
          path: openwrt-R3G/openwrt/logs/**
          if-no-files-found: ignore

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-R3G-${{ inputs.openwrt_ref }}
          path: openwrt-R3G/openwrt/bin/targets/ramips/mt7621/*

      - name: Prepare release
        if: ${{ inputs.create_release }}
        run: |
          safe_ref="$(printf '%s' '${{ inputs.openwrt_ref }}' | tr '/:@ ' '----')"
          echo "RELEASE_TAG=openwrt-R3G-${safe_ref}-${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=openwrt-R3G ${{ inputs.openwrt_ref }} build ${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Publish release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: openwrt-R3G ${{ inputs.openwrt_ref }} build ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          make_latest: false
          files: openwrt-R3G/openwrt/bin/targets/ramips/mt7621/*
